name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          dotnet publish TomodachiWeb.csproj \
            -c Release \
            -o published

      - name: Patch base href
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|g" \
            published/wwwroot/index.html

      - name: Copy 404.html
        run: cp published/wwwroot/index.html published/wwwroot/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: published/wwwroot
          force_orphan: true
