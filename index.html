<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomodachi Life: Image Converter</title>
    <style>
        /* Cozy & Retro Grid Style */
        :root {
            --bg-color: #121214;
            --grid-color: #232328;
            --accent: #bb86fc; 
            --accent-hover: #9e6cf9;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --panel-bg: rgba(25, 25, 30, 0.85);
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-main);
        }

        .container {
            background-color: var(--panel-bg);
            border: 1px solid var(--grid-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label.label-text {
            display: block;
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        select {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--grid-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }

        .file-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            display: inline-block;
            background-color: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 12px 24px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--accent);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(187, 134, 252, 0.4);
        }

        .btn:disabled {
            border-color: var(--text-muted);
            color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
        }

        #file-name {
            display: block;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #aaa;
            word-break: break-all;
            text-align: center;
        }

        .coffee-container {
            margin-top: 30px;
            border-top: 1px dashed var(--grid-color);
            padding-top: 20px;
        }
        
        .coffee-btn {
            display: inline-block;
            background-color: #FFDD00;
            color: #000;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: transform 0.2s;
        }

        .coffee-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tomodachi Tools</h1>
        <p class="subtitle">Image to Game Format Converter</p>

        <div class="input-group">
            <label class="label-text">1. Choose Format</label>
            <select id="format-select">
                <option value="LTDG">.ltdg (UGC)</option>
                <option value="LTDF">.ltdf (Food)</option>
            </select>
        </div>

        <div class="input-group">
            <label class="label-text">2. Upload Image</label>
            <div class="file-input-wrapper">
                <label for="file-upload" class="btn">📁 Select PNG</label>
                <input id="file-upload" type="file" accept="image/png" />
                <span id="file-name">No file selected</span>
            </div>
        </div>

        <button id="convert-btn" class="btn" disabled>⚙️ Convert & Download</button>

        <div class="coffee-container">
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px;">Did this tool help you?</p>
            <a href="https://www.buymeacoffee.com/YOUR_USERNAME" target="_blank" class="coffee-btn">
                ☕ Buy me a coffee (Not set yet)
            </a>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-upload');
        const fileNameDisplay = document.getElementById('file-name');
        const convertBtn = document.getElementById('convert-btn');
        const formatSelect = document.getElementById('format-select');
        let selectedFile = null;

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileNameDisplay.textContent = selectedFile.name;
                convertBtn.disabled = false;
            } else {
                selectedFile = null;
                fileNameDisplay.textContent = "No file selected";
                convertBtn.disabled = true;
            }
        });

        convertBtn.addEventListener('click', () => {
            if (!selectedFile) return;

            const format = formatSelect.value; // "LTDG" or "LTDF"
            const extension = "." + format.toLowerCase();

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    const imageData = ctx.getImageData(0, 0, img.width, img.height);
                    const rgba = imageData.data; 
                    const dataLength = rgba.length;

                    // Header (14 bytes) + Pixel Data
                    const buffer = new ArrayBuffer(14 + dataLength);
                    const view = new DataView(buffer);

                    // 1. Magic bytes based on selection (LTDG or LTDF)
                    for (let i = 0; i < 4; i++) {
                        view.setUint8(i, format.charCodeAt(i));
                    }

                    // 2. Version 1 (Little Endian)
                    view.setUint16(4, 1, true);

                    // 3. Width & Height
                    view.setUint16(6, img.width, true);
                    view.setUint16(8, img.height, true);

                    // 4. Data length
                    view.setUint32(10, dataLength, true);

                    // 5. Pixel Data (RGBA)
                    const pixelArray = new Uint8Array(buffer, 14);
                    pixelArray.set(rgba);

                    const newFileName = selectedFile.name.replace(/\.[^/.]+$/, "") + extension;
                    downloadFile(buffer, newFileName);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(selectedFile);
        });

        function downloadFile(buffer, filename) {
            const blob = new Blob([buffer], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
